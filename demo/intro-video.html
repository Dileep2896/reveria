<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reveria — Intro</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root{
    --violet:#b48cff; --amber:#ffa86c; --pink:#ff7eb3; --mint:#6ce8c0;
    --bg:#08080f; --text:#e8e0f0;
  }

  html,body{
    width:100vw; height:100vh;
    background:var(--bg); color:var(--text);
    font-family:'Outfit',sans-serif; overflow:hidden;
    position:relative;
  }

  /* ── Starfield background ── */
  .starfield{position:fixed;inset:0;z-index:0}
  .star{
    position:absolute; border-radius:50%; background:#fff;
    animation: twinkle var(--dur) ease-in-out var(--delay) infinite;
  }
  @keyframes twinkle{
    0%,100%{opacity:var(--base-o)} 50%{opacity:var(--peak-o)}
  }

  /* ── Nebula blobs ── */
  .nebula{
    position:fixed; border-radius:50%;
    filter:blur(80px); z-index:0; pointer-events:none;
  }
  .nebula-1{
    width:40vw;height:40vw;top:-5%;left:-10%;
    background:radial-gradient(circle, rgba(180,140,255,0.12), transparent 70%);
    animation: nebulaFloat 12s ease-in-out infinite;
  }
  .nebula-2{
    width:35vw;height:35vw;bottom:-10%;right:-5%;
    background:radial-gradient(circle, rgba(255,168,108,0.1), transparent 70%);
    animation: nebulaFloat 12s ease-in-out 4s infinite;
  }
  .nebula-3{
    width:25vw;height:25vw;top:50%;left:60%;
    background:radial-gradient(circle, rgba(255,126,179,0.07), transparent 70%);
    animation: nebulaFloat 12s ease-in-out 8s infinite;
  }
  @keyframes nebulaFloat{
    0%,100%{transform:translate(0,0) scale(1)}
    50%{transform:translate(15px,-20px) scale(1.05)}
  }

  /* ── Center glow ── */
  .center-glow{
    position:fixed; top:50%; left:50%;
    width:50vmin; height:50vmin;
    transform:translate(-50%,-55%);
    background:radial-gradient(circle, rgba(180,140,255,0.18) 0%, rgba(255,168,108,0.05) 40%, transparent 70%);
    opacity:0; z-index:1; pointer-events:none;
    animation: glowIn 2.5s ease-out 0.2s forwards;
  }
  @keyframes glowIn{to{opacity:1}}

  /* ── Main container ── */
  .intro{
    position:fixed;inset:0;z-index:2;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:5vh 5vw;
  }

  /* ── Logo icon ── */
  .logo-icon{
    width:clamp(80px, 12vmin, 160px); height:clamp(80px, 12vmin, 160px);
    opacity:0; transform:scale(0.2) rotate(-10deg);
    animation: logoReveal 1.4s cubic-bezier(0.34,1.56,0.64,1) 0.5s forwards;
    filter:drop-shadow(0 0 30px rgba(180,140,255,0.4));
  }
  @keyframes logoReveal{
    60%{transform:scale(1.08) rotate(2deg)}
    to{opacity:1;transform:scale(1) rotate(0deg)}
  }

  .logo-icon svg{width:100%;height:100%}

  /* Orb breathing */
  .dream-orb{animation:orbBreathe 3s ease-in-out infinite}
  @keyframes orbBreathe{
    0%,100%{r:12} 50%{r:13.5}
  }

  /* Sparks */
  .spark-1{animation:sparkFloat 3.5s ease-in-out infinite}
  .spark-2{animation:sparkFloat 3.5s ease-in-out 0.8s infinite}
  .spark-3{animation:sparkFloat 3.5s ease-in-out 1.6s infinite}
  .spark-4{animation:sparkFloat 3.5s ease-in-out 2.4s infinite}
  @keyframes sparkFloat{
    0%,100%{transform:translateY(0) scale(1);opacity:0.7}
    50%{transform:translateY(-4px) scale(1.4);opacity:1}
  }

  /* ── Wordmark ── */
  .wordmark{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(48px, 8vmin, 100px); font-weight:700;
    letter-spacing:0.08em;
    background:linear-gradient(135deg, #d4bdff 0%, var(--violet) 25%, var(--pink) 50%, var(--amber) 75%, #ffe0c0 100%);
    background-size:200% 200%;
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    opacity:0; transform:translateY(40px);
    animation: textUp 1.2s cubic-bezier(0.22,1,0.36,1) 1.2s forwards,
               gradientShift 6s ease-in-out 2.4s infinite;
    margin-top:1.5vmin;
    text-shadow:none;
  }
  @keyframes textUp{to{opacity:1;transform:translateY(0)}}
  @keyframes gradientShift{
    0%,100%{background-position:0% 50%} 50%{background-position:100% 50%}
  }

  /* ── Tagline ── */
  .tagline{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(16px, 2.8vmin, 30px); font-weight:400; font-style:italic;
    letter-spacing:0.1em;
    color:rgba(232,224,240,0.6);
    opacity:0; transform:translateY(20px);
    animation: textUp 0.9s cubic-bezier(0.22,1,0.36,1) 1.8s forwards;
    margin-top:0.8vmin;
  }

  /* ── Divider line ── */
  .divider{
    width:0; height:1px; margin-top:3.5vmin;
    background:linear-gradient(90deg, transparent, var(--violet) 30%, var(--amber) 70%, transparent);
    animation: dividerGrow 1s cubic-bezier(0.22,1,0.36,1) 2.4s forwards;
  }
  @keyframes dividerGrow{to{width:min(400px, 35vw)}}

  /* ── Tech pills ── */
  .tech-row{
    display:flex; gap:clamp(8px, 1.2vmin, 18px); margin-top:3vmin;
    flex-wrap:wrap; justify-content:center;
    opacity:0; transform:translateY(20px);
    animation: textUp 0.8s cubic-bezier(0.22,1,0.36,1) 2.9s forwards;
  }
  .tech-pill{
    padding:0.6vmin 1.6vmin; border-radius:999px;
    font-family:'Outfit',sans-serif;
    font-size:clamp(10px, 1.3vmin, 15px); font-weight:600;
    letter-spacing:0.08em; text-transform:uppercase;
    border:1px solid rgba(180,140,255,0.2);
    background:rgba(180,140,255,0.06);
    color:rgba(232,224,240,0.8);
    backdrop-filter:blur(12px);
    transition:all 0.3s ease;
  }
  .tech-pill.amber{border-color:rgba(255,168,108,0.2);background:rgba(255,168,108,0.06)}
  .tech-pill.pink{border-color:rgba(255,126,179,0.2);background:rgba(255,126,179,0.06)}
  .tech-pill.mint{border-color:rgba(108,232,192,0.2);background:rgba(108,232,192,0.06)}

  /* Sequential pill pop-in */
  .tech-pill{opacity:0;animation:pillPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards}
  .tech-pill:nth-child(1){animation-delay:2.9s}
  .tech-pill:nth-child(2){animation-delay:3.05s}
  .tech-pill:nth-child(3){animation-delay:3.2s}
  .tech-pill:nth-child(4){animation-delay:3.35s}
  .tech-pill:nth-child(5){animation-delay:3.5s}
  @keyframes pillPop{
    0%{opacity:0;transform:scale(0.7) translateY(10px)}
    to{opacity:1;transform:scale(1) translateY(0)}
  }

  /* ── Hackathon badge ── */
  .hackathon{
    margin-top:4vmin;
    opacity:0; transform:translateY(16px);
    animation: textUp 0.7s cubic-bezier(0.22,1,0.36,1) 3.8s forwards;
    text-align:center;
  }
  .hackathon-label{
    font-family:'Outfit',sans-serif;
    font-size:clamp(10px, 1.1vmin, 14px); font-weight:300;
    letter-spacing:0.15em; text-transform:uppercase;
    color:rgba(232,224,240,0.35);
  }
  .hackathon-name{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(16px, 2.2vmin, 26px); font-weight:600;
    letter-spacing:0.04em;
    background:linear-gradient(90deg, var(--amber), var(--violet));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    margin-top:0.5vmin;
  }

  /* ── Corner accents ── */
  .corner{
    position:fixed; width:clamp(30px,5vmin,70px); height:clamp(30px,5vmin,70px);
    opacity:0; z-index:3;
    animation: cornerDraw 0.6s ease-out 4.2s forwards;
  }
  @keyframes cornerDraw{to{opacity:0.25}}
  .corner-tl{top:3vmin;left:3vmin;border-top:1px solid var(--violet);border-left:1px solid var(--violet)}
  .corner-tr{top:3vmin;right:3vmin;border-top:1px solid var(--amber);border-right:1px solid var(--amber)}
  .corner-bl{bottom:3vmin;left:3vmin;border-bottom:1px solid var(--amber);border-left:1px solid var(--amber)}
  .corner-br{bottom:3vmin;right:3vmin;border-bottom:1px solid var(--violet);border-right:1px solid var(--violet)}

  /* ── Floating particles ── */
  .bg-particles{position:fixed;inset:0;overflow:hidden;z-index:0;pointer-events:none}
  .particle{
    position:absolute; border-radius:50%; opacity:0;
    animation: particleRise var(--dur) ease-in-out var(--delay) infinite;
  }
  @keyframes particleRise{
    0%{opacity:0;transform:translateY(30px) scale(0.5)}
    15%{opacity:var(--peak-o)}
    85%{opacity:calc(var(--peak-o) * 0.5)}
    100%{opacity:0;transform:translateY(-80px) scale(1.1)}
  }
</style>
</head>
<body>

<!-- Nebula background -->
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<!-- Starfield -->
<div class="starfield" id="starfield"></div>

<!-- Floating particles -->
<div class="bg-particles" id="particles"></div>

<!-- Center glow -->
<div class="center-glow"></div>

<!-- Corner accents -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Main content -->
<div class="intro">

  <!-- Logo Icon -->
  <div class="logo-icon">
    <svg viewBox="0 0 52 52" fill="none">
      <defs>
        <linearGradient id="ringGrad" x1="4" y1="4" x2="48" y2="48">
          <stop offset="0%" stop-color="#b48cff"/>
          <stop offset="100%" stop-color="#ff7eb3"/>
        </linearGradient>
        <radialGradient id="orbGrad" cx="50%" cy="40%" r="50%">
          <stop offset="0%" stop-color="#d4bdff"/>
          <stop offset="60%" stop-color="#b48cff"/>
          <stop offset="100%" stop-color="#7c4dff" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="orbGrad2" cx="40%" cy="30%" r="50%">
          <stop offset="0%" stop-color="#ffa86c"/>
          <stop offset="100%" stop-color="#ffa86c" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="bookGrad" x1="16" y1="28" x2="36" y2="20">
          <stop offset="0%" stop-color="#e8deff"/>
          <stop offset="100%" stop-color="#ffd4b8"/>
        </linearGradient>
      </defs>
      <circle cx="26" cy="26" r="22" stroke="url(#ringGrad)" stroke-width="1.2" opacity="0.3"/>
      <circle cx="26" cy="26" r="12" fill="url(#orbGrad)" class="dream-orb" opacity="0.9"/>
      <circle cx="26" cy="26" r="12" fill="url(#orbGrad2)" class="dream-orb" opacity="0.4"/>
      <path d="M16 28 C16 24, 20 20, 26 19 C32 20, 36 24, 36 28" stroke="url(#bookGrad)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.8"/>
      <line x1="26" y1="19" x2="26" y2="29" stroke="url(#bookGrad)" stroke-width="1" opacity="0.5"/>
      <circle cx="18" cy="14" r="1.8" fill="#ffa86c" class="spark-1"/>
      <circle cx="34" cy="12" r="2" fill="#b48cff" class="spark-2"/>
      <circle cx="38" cy="20" r="1.5" fill="#6ce8c0" class="spark-3"/>
      <circle cx="14" cy="22" r="1.3" fill="#ff7eb3" class="spark-4"/>
      <circle cx="22" cy="10" r="0.7" fill="#fff" opacity="0.5" class="spark-3"/>
      <circle cx="32" cy="18" r="0.6" fill="#fff" opacity="0.4" class="spark-1"/>
    </svg>
  </div>

  <!-- Wordmark -->
  <div class="wordmark">Reveria</div>

  <!-- Tagline -->
  <div class="tagline">Stories from your imagination</div>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- Tech pills -->
  <div class="tech-row">
    <div class="tech-pill">Gemini 2.5</div>
    <div class="tech-pill amber">Imagen 3</div>
    <div class="tech-pill pink">Live API</div>
    <div class="tech-pill mint">Google ADK</div>
    <div class="tech-pill">Cloud Run</div>
  </div>

  <!-- Hackathon badge -->
  <div class="hackathon">
    <div class="hackathon-label">Built for</div>
    <div class="hackathon-name">Gemini Live Agent Challenge</div>
  </div>

</div>

<!-- Background music — drop an mp3 in this folder named intro-music.mp3 -->
<audio id="bgMusic" loop preload="auto">
  <source src="intro-music.mp3" type="audio/mpeg">
</audio>

<script>
  // Generate starfield
  const sf = document.getElementById('starfield');
  for(let i = 0; i < 120; i++){
    const s = document.createElement('div');
    s.className = 'star';
    const size = 0.5 + Math.random() * 2;
    s.style.width = s.style.height = size + 'px';
    s.style.left = Math.random()*100 + '%';
    s.style.top = Math.random()*100 + '%';
    s.style.setProperty('--dur', (3 + Math.random()*4) + 's');
    s.style.setProperty('--delay', (Math.random()*5) + 's');
    s.style.setProperty('--base-o', (0.1 + Math.random()*0.3).toFixed(2));
    s.style.setProperty('--peak-o', (0.5 + Math.random()*0.5).toFixed(2));
    sf.appendChild(s);
  }

  // Generate floating particles
  const pc = document.getElementById('particles');
  const colors = ['#b48cff','#ffa86c','#ff7eb3','#6ce8c0','#d4bdff'];
  for(let i = 0; i < 30; i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random()*100 + '%';
    p.style.top = (20 + Math.random()*70) + '%';
    const size = 2 + Math.random()*3;
    p.style.width = p.style.height = size + 'px';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.setProperty('--dur', (8 + Math.random()*8) + 's');
    p.style.setProperty('--delay', (Math.random()*10) + 's');
    p.style.setProperty('--peak-o', (0.3 + Math.random()*0.4).toFixed(2));
    pc.appendChild(p);
  }

  // Music — autoplay attempt + click fallback
  const music = document.getElementById('bgMusic');
  music.volume = 0.25;
  music.play().catch(()=>{});
  document.addEventListener('click', () => {
    if(music.paused){ music.play().catch(()=>{}); }
  }, {once:true});
</script>
</body>
</html>
