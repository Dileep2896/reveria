name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Test jobs — run on every PR and push to main
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - run: pip install -r requirements-test.txt

      - run: pytest -v

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npx eslint .

      - name: Build with dummy Firebase env
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: dummy-key
          VITE_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: dummy-project
          VITE_WS_URL: ws://localhost:8000/ws

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - run: npx playwright test

  # ───────────────────────────────────────────────────────────────────────────
  # Deploy jobs — only on push to main, after tests pass
  # ───────────────────────────────────────────────────────────────────────────

  deploy-backend:
    name: Deploy Backend (Cloud Run)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy storyforge-backend \
            --source backend \
            --project storyforge-hackathon \
            --region us-central1 \
            --allow-unauthenticated \
            --cpu-boost \
            --quiet

  deploy-frontend:
    name: Deploy Frontend (Firebase Hosting)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build with production env
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: storyforge-hackathon-1beac
          entryPoint: frontend
